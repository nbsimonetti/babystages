<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%BC%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#df5e4b" />
    <meta
      name="description"
      content="BabyStages — see what to expect from your baby at every age, with milestones and parenting guidance from trusted, evidence-based sources."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>BabyStages — what to expect, age by age</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA fallback (pairs with public/404.html): if we were bounced here from a
      // deep link, restore the original URL before React mounts so the router
      // renders the right route. No-op for normal loads.
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
